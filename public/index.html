<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Weaver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <h1 class="logo">Story Weaver</h1>
            <nav class="main-nav">
                <button id="show-stories-btn" class="nav-btn">Browse Stories</button>
                <button id="create-story-btn" class="nav-btn">Create New Story</button>
                <button id="user-profile-btn" class="nav-btn">Profile</button>
            </nav>
        </header>

        <main id="main-content">
            <section id="story-list-section" class="hidden">
                <h2>Available Stories</h2>
                <ul id="story-list">
                    <!-- Story list items will be populated here -->
                </ul>
            </section>

            <section id="story-view-section">
                <h2 id="story-title">Select or Create a Story</h2>
                <p id="story-genre">Genre: <span id="display-genre">N/A</span></p>
                <div id="story-narrative">
                    <!-- Story narrative will be displayed here -->
                    <p>Start by selecting a story or creating a new one.</p>
                </div>

                <div id="story-controls" class="hidden">
                    <div class="input-group">
                        <label for="new-text">Add to the Story:</label>
                        <textarea id="new-text" rows="3" placeholder="Write your sentence or paragraph here..."></textarea>
                        <button id="add-text-btn" class="action-btn">Add Text</button>
                    </div>

                    <div class="ai-suggestions">
                        <h3>AI Assistance</h3>
                        <button id="suggest-continuation-btn" class="action-btn ai-btn">Suggest Next Sentence</button>
                        <button id="suggest-plot-twist-btn" class="action-btn ai-btn">Suggest Plot Twist</button>
                        <button id="suggest-character-action-btn" class="action-btn ai-btn">Suggest Character Action</button>
                        <div id="ai-suggestion-output" class="ai-output"></div>
                    </div>

                    <div class="history-controls">
                        <h3>Version History</h3>
                        <button id="view-history-btn" class="action-btn">View History</button>
                        <div id="history-list" class="hidden">
                            <!-- History items will be populated here -->
                        </div>
                    </div>
                </div>
            </section>

            <section id="create-story-section" class="hidden">
                <h2>Create a New Story</h2>
                <div class="input-group">
                    <label for="story-prompt">Initial Prompt:</label>
                    <textarea id="story-prompt" rows="4" placeholder="Enter the beginning of your story..."></textarea>
                </div>
                <div class="input-group">
                    <label for="story-genre-input">Genre:</label>
                    <input type="text" id="story-genre-input" placeholder="e.g., Fantasy, Sci-Fi, Mystery">
                </div>
                <button id="submit-new-story-btn" class="action-btn">Create Story</button>
            </section>

            <section id="user-profile-section" class="hidden">
                <h2>User Profile</h2>
                <p>Username: <span id="profile-username">Guest</span></p>
                <h3>Followed Stories</h3>
                <ul id="followed-stories-list">
                    <li>No stories followed yet.</li>
                </ul>
            </section>
        </main>

        <footer class="main-footer">
            <p>&copy; 2023 AgenticStudio. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
